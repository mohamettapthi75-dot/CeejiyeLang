name: CeejiyeLang Tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .
      - name: Run basic test
        run: |
          python3 -m ceejiye.cli run tests/test_basic.cee <<EOF
          TestUser
          EOF
