<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CeejiyeLang Playground v3.0.0</title>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.24.1/full/pyodide.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/theme/dracula.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/python/python.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; background: #282a36; color: #f8f8f2; }
        header { padding: 15px 25px; background: #44475a; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #6272a4; }
        .container { display: flex; flex: 1; overflow: hidden; }
        .editor-container, .output-container { flex: 1; display: flex; flex-direction: column; position: relative; }
        .editor-container { border-right: 1px solid #6272a4; }
        .CodeMirror { flex: 1; font-size: 16px; height: 100%; }
        #output { flex: 1; background: #000; color: #50fa7b; padding: 15px; font-family: 'Consolas', 'Monaco', 'Courier New', monospace; white-space: pre-wrap; overflow-y: auto; font-size: 14px; }
        .controls { padding: 12px 20px; background: #44475a; display: flex; gap: 15px; border-top: 1px solid #6272a4; }
        button { padding: 10px 20px; cursor: pointer; border: none; border-radius: 6px; background: #6272a4; color: white; font-weight: bold; transition: all 0.2s; }
        button:hover { background: #50fa7b; color: #282a36; transform: translateY(-1px); }
        button:active { transform: translateY(0); }
        .btn-share { background: #bd93f9; }
        #status { font-size: 13px; color: #8be9fd; font-weight: bold; }
        h1 { margin: 0; font-size: 22px; color: #ff79c6; }
    </style>
</head>
<body>
    <header>
        <h1>🇸🇴 CeejiyeLang Playground v3.0.0</h1>
        <div id="status">Soo dejinaya Pyodide...</div>
    </header>
    <div class="container">
        <div class="editor-container">
            <textarea id="editor">daabac("Salaan, Adduunka!")</textarea>
            <div class="controls">
                <button onclick="runCode()">Orod (Run)</button>
                <button onclick="clearOutput()">Nadiifi (Clear)</button>
                <button class="btn-share" onclick="shareCode()">Wadaag (Share)</button>
            </div>
        </div>
        <div class="output-container">
            <div id="output"></div>
        </div>
    </div>

    <script>
        let pyodide;
        const outputElement = document.getElementById('output');
        const statusElement = document.getElementById('status');

        const KEYWORDS = {
          'daabac': 'print',
          'geli': 'input',
          'hadii': 'if',
          'kale': 'else',
          'hadii_kale': 'elif',
          'markale': 'while',
          'wareeg': 'for',
          'shaqo': 'def',
          'soo_celi': 'return',
          'celi': 'return',
          'iyo': 'and',
          'ama': 'or',
          'ma_aha': 'not',
          'run': 'True',
          'been': 'False',
          'waxba': 'None',
          'u_yahay': '==',
          'kama_yahay': '!=',
          'dherer': 'len',
          'tiro': 'int',
          'jajab': 'float',
          'qoraal': 'str',
          'nooc': 'type',
        };

        async function init() {
            try {
                pyodide = await loadPyodide();
                statusElement.innerText = "Pyodide waa diyaar";

                // Define the transpiler in Python context
                await pyodide.runPythonAsync(`
import re
import json

KEYWORDS_JSON = '${JSON.stringify(KEYWORDS)}'
KEYWORDS = json.loads(KEYWORDS_JSON)

def transpile(source):
    # Sort keys by length descending to avoid partial matches
    sorted_keys = sorted(KEYWORDS.keys(), key=len, reverse=True)
    pattern = re.compile(
        r'("""[\\s\\S]*?"""|\\'\\'\\'[\\s\\S]*?\\'\\'\\'|"[^"]*"|\\'[^\\']*\\'|#.*$|\\b' +
        r'\\b|\\b'.join(map(re.escape, sorted_keys)) + r'\\b)',
        re.MULTILINE
    )
    def replace(match):
        token = match.group(0)
        if token.startswith(('"', "'", '#')): return token
        return KEYWORDS.get(token, token)
    return pattern.sub(replace, source)
                `);

                // Check for code in URL
                const urlParams = new URLSearchParams(window.location.search);
                const code = urlParams.get('code');
                if (code) {
                    try {
                        editor.setValue(atob(code));
                    } catch(e) {
                        console.error("URL decoding failed", e);
                    }
                }
            } catch (err) {
                statusElement.innerText = "Qalad dhacay: " + err.message;
            }
        }

        const editor = CodeMirror.fromTextArea(document.getElementById('editor'), {
            mode: 'python',
            theme: 'dracula',
            lineNumbers: true,
            indentUnit: 4,
            autoCloseBrackets: true,
            matchBrackets: true
        });

        async function runCode() {
            if (!pyodide) return;
            const code = editor.getValue();
            outputElement.innerText = "Soconaya...";

            try {
                // Redirect stdout
                pyodide.runPython(`
import sys
import io
sys.stdout = io.StringIO()
                `);

                const transpiled = pyodide.runPython(`transpile(${JSON.stringify(code)})`);
                await pyodide.runPythonAsync(transpiled);

                const output = pyodide.runPython("sys.stdout.getvalue()");
                outputElement.innerText = output || "Koodhku si guul leh ayuu u socday (wax soo saar ma leh).";
            } catch (err) {
                outputElement.innerText = "KHALAD:\n" + err;
            }
        }

        function clearOutput() {
            outputElement.innerText = "";
        }

        function shareCode() {
            const code = btoa(editor.getValue());
            const url = window.location.origin + window.location.pathname + "?code=" + code;
            navigator.clipboard.writeText(url).then(() => {
                alert("Xiriirka wadaagga waa la koobiyey!");
            });
        }

        init();
    </script>
</body>
</html>
